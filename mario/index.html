      body {
        font-family: arial;
        margin: 0;
        background-color: black;
        padding: 0;
      }

      .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
      div.emscripten { text-align: center; }      
      div.emscripten_border { border: 1px solid black; }
      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten { border: 0px none; }

      #emscripten_logo {
        display: inline-block;
        margin: 0;
      }

      .spinner {
        height: 30px;
        width: 30px;
        margin: 0;
        margin-top: 20px;
        margin-left: 20px;
        display: inline-block;
        vertical-align: top;

        -webkit-animation: rotation .8s linear infinite;
        -moz-animation: rotation .8s linear infinite;
        -o-animation: rotation .8s linear infinite;
        animation: rotation 0.8s linear infinite;

        border-left: 5px solid rgb(0, 0, 0);
        border-right: 5px solid rgb(0, 0, 0);
        border-bottom: 5px solid rgb(0, 0, 0);
        border-top: 5px solid rgb(0, 0, 0);
        
        border-radius: 100%;
        background-color: rgb(189, 215, 46);
      }

      @-webkit-keyframes rotation {
        from {-webkit-transform: rotate(0deg);}
        to {-webkit-transform: rotate(360deg);}
      }
      @-moz-keyframes rotation {
        from {-moz-transform: rotate(0deg);}
        to {-moz-transform: rotate(360deg);}
      }
      @-o-keyframes rotation {
        from {-o-transform: rotate(0deg);}
        to {-o-transform: rotate(360deg);}
      }
      @keyframes rotation {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
      }

      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-left: 20px;
        font-weight: bold;
        color: rgb(120, 120, 120);
      }

      #progress {
        height: 20px;
        width: 30px;
      }

      #controls {
        display: inline-block;
        float: right;
        vertical-align: top;
        margin-top: 30px;
        margin-right: 20px;
      }

        display: block;
        background-color: black;
        color: rgb(120, 120, 120);
        font-family: 'Lucida Console', Monaco, monospace;
        outline: none;
      }

      function openFullscreen(elem) {
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
      }

      // 全画面変更時にキャンバスサイズを調整
      function adjustCanvasSize() {
        var canvas = document.getElementById('canvas');
        var container = document.getElementById('canvas-container');
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        
        if (isFullscreen) {
          setTimeout(function() {
            var screenWidth = window.innerWidth;
            var screenHeight = window.innerHeight;
            var gameAspect = 1280 / 720; // ゲームのアスペクト比
            var screenAspect = screenWidth / screenHeight;
            
            var newWidth, newHeight;
            if (screenAspect > gameAspect) {
              // 画面が横長：高さに合わせる
              newHeight = screenHeight;
              newWidth = Math.floor(screenHeight * gameAspect);
            } else {
              // 画面が縦長：幅に合わせる
              newWidth = screenWidth;
              newHeight = Math.floor(screenWidth / gameAspect);
            }
            
            canvas.style.width = newWidth + 'px';
            canvas.style.height = newHeight + 'px';
          }, 100);
        } else {
          canvas.style.width = '';
          canvas.style.height = '';
        }
      }

      // 画面回転時にも再調整
      function handleOrientationChange() {
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        if (isFullscreen) {
          adjustCanvasSize();
        }
      }

      document.addEventListener('fullscreenchange', adjustCanvasSize);
      document.addEventListener('webkitfullscreenchange', adjustCanvasSize);
      document.addEventListener('mozfullscreenchange', adjustCanvasSize);
      document.addEventListener('MSFullscreenChange', adjustCanvasSize);
      
      // 画面回転対応
      window.addEventListener('orientationchange', function() {
        setTimeout(handleOrientationChange, 200);
      });
      window.addEventListener('resize', function() {
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        if (isFullscreen) {
          setTimeout(adjustCanvasSize, 100);
        }
      });

    function fetchRemotePackage(packageName, packageSize, callback, errback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', packageName, true);
      xhr.responseType = 'arraybuffer';
      xhr.onprogress = function(event) {
        var url = packageName;
        var size = packageSize;
        if (event.total) size = event.total;
        if (event.loaded) {
          if (!xhr.addedTotal) {
            xhr.addedTotal = true;
            if (!Module.dataFileDownloads) Module.dataFileDownloads = {};
            Module.dataFileDownloads[url] = {
              loaded: event.loaded,
              total: size
            };
          } else {
            Module.dataFileDownloads[url].loaded = event.loaded;
          }
          var total = 0;
          var loaded = 0;
          var num = 0;
          for (var download in Module.dataFileDownloads) {
          var data = Module.dataFileDownloads[download];
            total += data.total;
            loaded += data.loaded;
            num++;
          }
          total = Math.ceil(total * Module.expectedDataFileDownloads/num);
          if (Module['setStatus']) Module['setStatus']('Downloading data... (' + loaded + '/' + total + ')');
        } else if (!Module.dataFileDownloads) {
          if (Module['setStatus']) Module['setStatus']('Downloading data...');
        }
      };
      xhr.onload = function(event) {
        var packageData = xhr.response;
        callback(packageData);
      };
      xhr.send(null);
    };

    function handleError(error) {
      console.error('package error:', error);
    };
